<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ARIA — Helpdesk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#07060b;--bg-1:#0c0a13;--bg-2:#14111d;--bg-3:#1c1828;--bg-4:#25203a;
  --fg-0:#fff;--fg-1:#eae6f5;--fg-2:#9a94b3;--fg-3:#6a6480;--fg-4:#3e3a54;
  --line-1:rgba(255,255,255,.06);--line-2:rgba(255,255,255,.10);--line-3:rgba(255,255,255,.16);
  --v-200:#c6b8ff;--v-400:#8a6bff;--v-500:#6e46ff;--v-600:#5a34f0;--v-700:#4a26c9;--v-900:#1e1247;
  --ok:#2ecf8b;--ok-s:rgba(46,207,139,.14);--warn:#f5b64b;--warn-s:rgba(245,182,75,.14);--bad:#ff5e7a;--bad-s:rgba(255,94,122,.14);--info:#5cc4ff;
  --ring-v:0 0 0 3px rgba(110,70,255,.25);--shadow-md:0 6px 24px rgba(0,0,0,.35);
  --grad-violet:linear-gradient(135deg,#6e46ff 0%,#9a6bff 60%,#b983ff 100%);
  --grad-hero:radial-gradient(1200px 600px at 20% 30%,rgba(110,70,255,.35),transparent 60%),radial-gradient(900px 500px at 85% 80%,rgba(92,196,255,.18),transparent 60%),linear-gradient(180deg,#0a0814 0%,#110c1f 100%);
  --grad-edge:linear-gradient(180deg,transparent 0%,rgba(110,70,255,.15) 50%,transparent 100%);
  --font-sans:'Inter',system-ui,sans-serif;--font-display:'Space Grotesk','Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg-0);color:var(--fg-1);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
body{min-height:100vh;overflow-x:hidden}
button{font-family:inherit;color:inherit;background:none;border:0;cursor:pointer}
input,textarea,select{font-family:inherit;color:inherit;background:transparent;border:0;outline:0}

/* top nav chrome */
.nav-chrome{position:sticky;top:0;z-index:50;background:rgba(7,6,11,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line-1);padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand-wordmark{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:-.01em}
.brand-dot{width:28px;height:28px;border-radius:9px;background:var(--grad-violet);display:grid;place-items:center;color:#fff;font-size:15px;font-weight:700;box-shadow:0 6px 20px rgba(110,70,255,.5),inset 0 1px 0 rgba(255,255,255,.3)}
.screens-tabs{display:flex;gap:3px;flex-wrap:wrap;flex:1;justify-content:center}
.screen-tab{padding:7px 13px;border-radius:999px;font-size:13px;font-weight:500;color:var(--fg-2);transition:all .15s}
.screen-tab:hover{color:var(--fg-1);background:var(--bg-2)}
.screen-tab.active{color:#fff;background:var(--bg-3);box-shadow:inset 0 0 0 1px var(--line-2)}
.screen-tab.active::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--v-500);box-shadow:0 0 8px var(--v-500);margin-right:8px;vertical-align:middle}
.variant-pills{display:flex;gap:3px;padding:3px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:999px}
.vpill{padding:5px 13px;border-radius:999px;font-size:12px;color:var(--fg-2);font-weight:500}
.vpill.active{background:var(--grad-violet);color:#fff;box-shadow:0 4px 14px rgba(110,70,255,.5)}

/* stage */
.stage{min-height:calc(100vh - 57px);background:var(--bg-0);position:relative}
.screen{display:none}
.screen.active{display:block}

/* app shell */
.app{width:100%;min-height:calc(100vh - 57px);display:grid;grid-template-columns:72px 256px 1fr;background:var(--bg-1);overflow:hidden;position:relative}
.app.three-col{grid-template-columns:72px 256px 1fr 340px}

/* rail */
.rail{background:var(--bg-0);border-right:1px solid var(--line-1);padding:18px 0;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative}
.rail::after{content:'';position:absolute;top:0;right:-1px;bottom:0;width:1px;background:var(--grad-edge);pointer-events:none}
.rail-logo{width:42px;height:42px;border-radius:12px;background:var(--grad-violet);display:grid;place-items:center;color:#fff;font-family:var(--font-display);font-weight:700;font-size:20px;box-shadow:0 10px 30px rgba(110,70,255,.55),inset 0 1px 0 rgba(255,255,255,.3);margin-bottom:14px}
.rail-btn{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;color:var(--fg-2);transition:all .15s;position:relative}
.rail-btn:hover{background:var(--bg-2);color:var(--fg-1)}
.rail-btn.active{background:var(--bg-3);color:#fff;box-shadow:inset 0 0 0 1px var(--line-2)}
.rail-btn.active::before{content:'';position:absolute;left:-12px;top:10px;bottom:10px;width:3px;border-radius:2px;background:var(--grad-violet)}
.rail-btn svg{width:20px;height:20px}
.rail-spacer{flex:1}

/* sidebar */
.side{background:var(--bg-1);border-right:1px solid var(--line-1);display:flex;flex-direction:column;overflow:hidden}
.side-top{padding:16px 14px 12px;border-bottom:1px solid var(--line-1)}
.ws-card{display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;background:var(--bg-2);border:1px solid var(--line-1)}
.ws-avatar{width:32px;height:32px;border-radius:9px;background:var(--grad-violet);display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
.ws-text{min-width:0;flex:1}
.ws-name{font-size:13px;font-weight:600;color:var(--fg-0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ws-mail{font-size:11px;color:var(--fg-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--font-mono)}
.ws-more{color:var(--fg-3);padding:2px;border-radius:6px}
.nav-section{padding:14px 10px 6px}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);padding:0 8px 8px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;color:var(--fg-2);font-size:13px;font-weight:500;cursor:pointer;transition:all .12s}
.nav-item:hover{background:var(--bg-2);color:var(--fg-1)}
.nav-item.active{background:var(--bg-3);color:#fff;box-shadow:inset 0 0 0 1px var(--line-2)}
.nav-item.active svg{color:var(--v-400)}
.nav-item svg{width:16px;height:16px;flex-shrink:0;stroke-width:1.8}
.nav-item .chev{margin-left:auto;font-size:12px;color:var(--fg-3)}
.nav-item .badge{margin-left:auto;font-size:10px;padding:2px 7px;border-radius:999px;background:var(--v-900);color:var(--v-200);font-weight:600}
.nav-item .dot-ok{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 6px var(--ok)}
.side-bottom{margin-top:auto;padding:10px;border-top:1px solid var(--line-1);display:flex;flex-direction:column;gap:2px}

/* main */
.main{background:var(--bg-1);display:flex;flex-direction:column;min-width:0;overflow:hidden;position:relative}
.topbar{height:56px;display:flex;align-items:center;gap:12px;padding:0 20px;border-bottom:1px solid var(--line-1);background:var(--bg-1)}
.crumbs{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--fg-2)}
.crumbs .sep{color:var(--fg-4)}
.crumbs .curr{color:var(--fg-0);font-weight:500}
.crumb-badge{display:inline-flex;align-items:center;gap:6px;padding:3px 8px 3px 6px;border-radius:999px;background:var(--v-900);color:var(--v-200);font-size:12px;font-weight:500}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.icon-btn{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:var(--fg-2);border:1px solid var(--line-1);background:var(--bg-2);transition:all .12s;position:relative}
.icon-btn:hover{color:var(--fg-0);background:var(--bg-3)}
.icon-btn svg{width:16px;height:16px}
.icon-btn .n{position:absolute;top:-4px;right:-4px;background:var(--v-500);color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:999px}
.chip-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:10px;font-size:12px;font-weight:500;color:var(--fg-1);border:1px solid var(--line-1);background:var(--bg-2)}
.chip-btn:hover{background:var(--bg-3)}
.chip-btn svg{width:14px;height:14px}
.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;background:var(--grad-violet);box-shadow:0 6px 18px rgba(110,70,255,.45),inset 0 1px 0 rgba(255,255,255,.2);transition:transform .1s}
.btn-primary:hover{transform:translateY(-1px)}
.btn-primary svg{width:14px;height:14px}

.promo{margin:14px 20px 0;padding:12px 16px;border-radius:14px;background:linear-gradient(100deg,#4a26c9 0%,#6e46ff 40%,#9a6bff 100%);display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;box-shadow:0 10px 30px rgba(110,70,255,.3)}
.promo::after{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(400px 120px at 80% -20%,rgba(255,255,255,.2),transparent 60%)}
.promo-icon{width:30px;height:30px;border-radius:10px;background:rgba(255,255,255,.18);display:grid;place-items:center;color:#fff}
.promo-icon svg{width:16px;height:16px}
.promo-text{flex:1;color:#fff;font-size:13px;font-weight:500}
.promo-btn{background:rgba(0,0,0,.3);color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,.2)}

.scroll{overflow:auto;flex:1;min-height:0}
.scroll::-webkit-scrollbar{width:10px;height:10px}
.scroll::-webkit-scrollbar-thumb{background:var(--bg-3);border-radius:6px;border:2px solid var(--bg-1)}

/* atoms */
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:500}
.pill.v{background:var(--v-900);color:var(--v-200)}
.pill.ok{background:var(--ok-s);color:var(--ok)}
.pill.warn{background:var(--warn-s);color:var(--warn)}
.pill.bad{background:var(--bad-s);color:var(--bad)}
.pill.ghost{background:var(--bg-2);color:var(--fg-2);border:1px solid var(--line-1)}
.pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor}
.card{background:var(--bg-2);border:1px solid var(--line-1);border-radius:14px;padding:16px}
.card.elev{background:var(--bg-3)}
.card h4{margin:0 0 4px;font-size:14px;font-weight:600;color:var(--fg-0)}
.card .sub{font-size:12px;color:var(--fg-3);margin:0}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 20px 0}
.kpi{background:var(--bg-2);border:1px solid var(--line-1);border-radius:14px;padding:14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--v-500),transparent);opacity:.5}
.kpi-label{font-size:11px;color:var(--fg-3);font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.kpi-value{font-family:var(--font-display);font-size:28px;font-weight:600;color:var(--fg-0);letter-spacing:-.02em;line-height:1}
.kpi-delta{font-size:11px;margin-top:4px;display:inline-flex;align-items:center;gap:4px;font-weight:500}
.kpi-delta.up{color:var(--ok)}.kpi-delta.down{color:var(--bad)}

/* chat */
.bubble{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.45;max-width:540px}
.bubble.them{background:var(--bg-3);color:var(--fg-1);border:1px solid var(--line-1)}
.bubble.me{background:var(--grad-violet);color:#fff;box-shadow:0 8px 20px rgba(110,70,255,.3);align-self:flex-end}
.bubble.ai{background:var(--bg-2);border:1px solid var(--line-2);color:var(--fg-1);position:relative}
.bubble.ai::before{content:'AI';position:absolute;top:-8px;left:12px;background:var(--grad-violet);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:.1em}
.meta-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--fg-3);margin-bottom:4px}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#f4a5b8,#b87a98);display:inline-block;flex-shrink:0;border:1.5px solid var(--bg-1)}
.avatar.b{background:var(--grad-violet);display:grid;place-items:center;color:#fff;font-size:11px;font-weight:700}
.avatar.c{background:linear-gradient(135deg,#9a6bff,#5cc4ff)}

/* table */
table.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
table.tbl th{text-align:left;padding:10px 14px;font-size:11px;font-weight:500;color:var(--fg-3);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--line-1);background:var(--bg-2);position:sticky;top:0}
table.tbl td{padding:12px 14px;border-bottom:1px solid var(--line-1);color:var(--fg-1);vertical-align:middle}
table.tbl tr:hover td{background:var(--bg-2)}

/* LOGIN */
.login-wrap{min-height:calc(100vh - 57px);display:grid;grid-template-columns:1fr 1fr;background:var(--bg-0);position:relative;overflow:hidden}
.login-vis{position:relative;overflow:hidden;background:linear-gradient(135deg,#1a0d3d 0%,#3d1a7a 50%,#6e46ff 100%);display:flex;flex-direction:column;justify-content:space-between;padding:48px}
.login-vis::before{content:'';position:absolute;top:-20%;right:-20%;width:80%;height:80%;background:radial-gradient(circle,rgba(255,255,255,.3) 0%,transparent 60%);filter:blur(60px)}
.login-vis::after{content:'';position:absolute;bottom:-30%;left:-10%;width:70%;height:70%;background:radial-gradient(circle,rgba(92,196,255,.4) 0%,transparent 55%);filter:blur(80px)}
.login-vis-inner{position:relative;z-index:1;color:#fff;display:flex;flex-direction:column;gap:36px}
.login-vis h2{font-family:var(--font-display);font-size:34px;line-height:1.15;margin:0;font-weight:600;letter-spacing:-.02em;max-width:420px}
.login-vis p{margin:0;font-size:15px;opacity:.85;max-width:380px;line-height:1.5}
.vis-card{position:relative;z-index:1;background:rgba(255,255,255,.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:18px;color:#fff;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.vis-card .vc-title{font-size:13px;opacity:.8;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.vis-card .vc-metric{font-family:var(--font-display);font-size:30px;font-weight:600;letter-spacing:-.02em}
.vis-card .vc-sub{font-size:12px;opacity:.8;margin-top:4px}

.login-form-wrap{display:flex;align-items:center;justify-content:center;padding:48px;background:var(--bg-1)}
.login-form{width:min(400px,100%)}
.login-form .sm-brand{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.login-form .sm-brand .brand-dot{width:34px;height:34px;font-size:17px;border-radius:10px}
.login-form .sm-brand span{font-family:var(--font-display);font-weight:700;font-size:20px}
.login-form h1{font-family:var(--font-display);font-size:30px;font-weight:600;margin:0 0 8px;color:var(--fg-0);letter-spacing:-.02em}
.login-form .lead{font-size:14px;color:var(--fg-2);margin:0 0 28px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--fg-2);font-weight:500;margin-bottom:6px}
.input{display:flex;align-items:center;gap:10px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:12px;padding:0 14px;height:46px;transition:all .15s}
.input:focus-within{border-color:var(--v-500);box-shadow:var(--ring-v)}
.input svg{width:16px;height:16px;color:var(--fg-3);flex-shrink:0}
.input input,.input select{flex:1;font-size:14px;color:var(--fg-0);height:100%}
.field-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:12px}
.check{display:inline-flex;align-items:center;gap:7px;color:var(--fg-2)}
.check input{width:15px;height:15px;accent-color:var(--v-500)}
.link{color:var(--v-400);text-decoration:none;font-weight:500}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--fg-3);font-size:11px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line-1)}
.sso{display:flex;gap:10px}
.sso-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:10px;padding:11px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:12px;font-size:13px;font-weight:500;color:var(--fg-1)}
.sso-btn:hover{background:var(--bg-3)}
.sso-btn svg{width:16px;height:16px}
.login-foot{text-align:center;margin-top:20px;color:var(--fg-3);font-size:12px}
.btn-wide{width:100%;padding:13px;justify-content:center;font-size:14px;margin-top:6px}

/* chat layout */
.chat-layout{display:grid;grid-template-columns:1fr 320px;flex:1;min-height:0;overflow:hidden}
.conv-scroll{padding:24px 28px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;background:var(--bg-1)}
.conv-start{text-align:center;color:var(--fg-3);font-size:11px;margin:8px 0 10px;display:flex;align-items:center;gap:10px}
.conv-start::before,.conv-start::after{content:'';flex:1;height:1px;background:var(--line-1)}
.msg-group{display:flex;flex-direction:column;gap:6px}
.msg-group.right{align-items:flex-end}

/* context panel */
.ctx{background:var(--bg-1);border-left:1px solid var(--line-1);display:flex;flex-direction:column;overflow-y:auto}
.ctx-head{padding:16px;border-bottom:1px solid var(--line-1);text-align:center}
.ctx-avatar{width:64px;height:64px;border-radius:50%;margin:0 auto 10px;background:linear-gradient(135deg,#f4a5b8,#b87a98);border:3px solid var(--bg-1);box-shadow:0 0 0 2px var(--v-500),0 0 20px rgba(110,70,255,.4)}
.ctx-name{font-size:15px;font-weight:600;color:#fff;margin:0}
.ctx-mail{font-size:12px;color:var(--fg-3);margin:2px 0 0;font-family:var(--font-mono)}
.ctx-tabs{display:flex;gap:2px;padding:10px;border-bottom:1px solid var(--line-1)}
.ctx-tab{flex:1;padding:7px 10px;border-radius:8px;color:var(--fg-2);font-size:12px;font-weight:500;text-align:center}
.ctx-tab.active{color:#fff;background:var(--bg-3);box-shadow:inset 0 0 0 1px var(--line-2)}
.ctx-body{padding:14px;display:flex;flex-direction:column;gap:12px}
.ctx-card{background:var(--bg-2);border:1px solid var(--line-1);border-radius:12px;padding:12px}
.ctx-card h5{margin:0 0 8px;font-size:11px;font-weight:600;color:var(--fg-3);letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.ctx-card h5 svg{width:12px;height:12px;color:var(--v-400)}
.ctx-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--line-1);font-size:12px;color:var(--fg-1)}
.ctx-row:first-of-type{border:0}
.ctx-row svg{width:14px;height:14px;color:var(--fg-3);flex-shrink:0}
.ctx-row .k{color:var(--fg-3);min-width:78px;font-size:11px}

/* composer */
.composer{border-top:1px solid var(--line-1);background:var(--bg-1);padding:14px 28px 18px}
.quick-chips{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.quick-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:var(--bg-2);border:1px solid var(--line-1);font-size:12px;font-weight:500;color:var(--fg-1)}
.quick-chip:hover{background:var(--bg-3)}
.hint-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:linear-gradient(90deg,rgba(245,182,75,.08),rgba(110,70,255,.08));border:1px solid var(--line-1);font-size:12px;color:var(--fg-2);margin-bottom:10px}
.hint-bar svg{width:14px;height:14px;color:var(--warn);flex-shrink:0}
.hint-bar code{background:var(--bg-3);padding:1px 6px;border-radius:4px;font-family:var(--font-mono);font-size:11px;color:var(--fg-0)}
.input-area{background:var(--bg-2);border:1px solid var(--line-2);border-radius:14px;padding:14px 16px;min-height:92px;display:flex;flex-direction:column;gap:10px}
.input-area:focus-within{border-color:var(--v-500)}
.input-placeholder{color:var(--fg-3);font-size:14px;flex:1}
.input-tools{display:flex;align-items:center;gap:6px}
.tool-btn{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--fg-2)}
.tool-btn:hover{background:var(--bg-3);color:var(--fg-1)}
.tool-btn svg{width:16px;height:16px}
.send-btn{margin-left:auto;display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:var(--grad-violet);color:#fff;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 6px 18px rgba(110,70,255,.45)}
.send-btn svg{width:14px;height:14px}

/* CoT */
.cot{border:1px solid var(--line-2);border-radius:12px;background:linear-gradient(180deg,rgba(110,70,255,.05),transparent);padding:12px;max-width:540px}
.cot-head{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--v-200);font-weight:600;margin-bottom:10px}
.cot-head svg{width:14px;height:14px}
.cot-step{display:flex;gap:10px;font-size:12px;color:var(--fg-2);padding:6px 0;border-top:1px dashed var(--line-1)}
.cot-step:first-of-type{border-top:0}
.cot-step .n{width:18px;height:18px;border-radius:50%;background:var(--v-900);color:var(--v-200);display:grid;place-items:center;font-size:10px;font-weight:700;flex-shrink:0}
.cot-step b{color:var(--fg-0);font-weight:500}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(4,minmax(240px,1fr));gap:14px;padding:20px}
.kcol{background:var(--bg-2);border:1px solid var(--line-1);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
.kcol-head{padding:12px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line-1)}
.kcol-head h5{margin:0;font-size:13px;font-weight:600;color:#fff}
.kcol-count{margin-left:auto;font-size:11px;color:var(--fg-3);background:var(--bg-3);padding:2px 8px;border-radius:999px}
.kcol-body{padding:10px;display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 260px);overflow-y:auto}
.kticket{background:var(--bg-3);border:1px solid var(--line-1);border-radius:10px;padding:12px;cursor:grab;transition:all .12s}
.kticket:hover{transform:translateY(-1px);border-color:var(--line-2)}
.kticket-id{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);font-weight:500}
.kticket-title{font-size:13px;font-weight:500;color:var(--fg-0);margin:4px 0 8px;line-height:1.4}
.kticket-foot{display:flex;align-items:center;gap:8px}

/* KB */
.kb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;padding:20px}
.kb-card{background:var(--bg-2);border:1px solid var(--line-1);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:10px;transition:all .15s;cursor:pointer}
.kb-card:hover{border-color:var(--line-2);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.kb-icon{width:40px;height:48px;border-radius:6px;background:linear-gradient(135deg,var(--v-700),var(--v-500));position:relative;box-shadow:0 6px 16px rgba(110,70,255,.3)}
.kb-icon::before{content:'';position:absolute;top:6px;left:6px;right:6px;height:2px;background:rgba(255,255,255,.4);border-radius:1px;box-shadow:0 5px 0 rgba(255,255,255,.2),0 10px 0 rgba(255,255,255,.15),0 15px 0 rgba(255,255,255,.1)}
.kb-card h5{margin:0;font-size:14px;font-weight:600;color:#fff;line-height:1.35}
.kb-meta{font-size:11px;color:var(--fg-3);font-family:var(--font-mono);display:flex;align-items:center;gap:6px}
.upload-zone{margin:20px;padding:32px;border-radius:16px;border:2px dashed var(--line-3);background:linear-gradient(135deg,rgba(110,70,255,.08),rgba(92,196,255,.04));display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.upload-zone svg{width:36px;height:36px;color:var(--v-400)}
.upload-zone h4{margin:0;font-size:16px;font-weight:600;color:#fff}
.upload-zone p{margin:0;font-size:13px;color:var(--fg-3)}

/* settings */
.settings-grid{display:grid;grid-template-columns:220px 1fr;flex:1;min-height:0}
.settings-nav{padding:24px 14px;border-right:1px solid var(--line-1);display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.settings-body{padding:28px 32px;overflow-y:auto}
.settings-body h2{font-family:var(--font-display);font-size:24px;font-weight:600;margin:0 0 4px;color:#fff;letter-spacing:-.01em}
.settings-body .lead{color:var(--fg-3);font-size:14px;margin:0 0 24px}
.settings-section{margin-bottom:28px}
.settings-section h3{font-size:15px;font-weight:600;color:#fff;margin:0 0 14px;display:flex;align-items:center;gap:8px}
.row-def{display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:center;padding:16px 0;border-top:1px solid var(--line-1)}
.row-def:first-of-type{border:0;padding-top:0}
.row-def .k{font-size:13px;font-weight:500;color:#fff}
.row-def .d{font-size:12px;color:var(--fg-3);margin-top:3px}
.row-def .val{display:flex;align-items:center;gap:10px;justify-content:flex-end}

.toggle{width:38px;height:22px;border-radius:999px;background:var(--bg-3);border:1px solid var(--line-2);position:relative;cursor:pointer;transition:all .15s}
.toggle::before{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--fg-2);transition:all .2s}
.toggle.on{background:var(--grad-violet);border-color:transparent}
.toggle.on::before{left:18px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.3)}

.slider{width:200px;height:6px;border-radius:999px;background:var(--bg-3);position:relative}
.slider::after{content:'';position:absolute;left:0;top:0;bottom:0;border-radius:999px;background:var(--grad-violet);width:60%}
.slider::before{content:'';position:absolute;left:calc(60% - 8px);top:-6px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 4px 12px rgba(110,70,255,.6)}

.select-box{display:inline-flex;align-items:center;gap:10px;padding:8px 14px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:10px;font-size:13px;color:var(--fg-1)}
.select-box svg{width:14px;height:14px;color:var(--fg-3)}

/* Analytics */
.chart-card{background:var(--bg-2);border:1px solid var(--line-1);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:12px}
.chart-head{display:flex;align-items:center;gap:10px}
.chart-head h4{margin:0;font-size:14px;font-weight:600;color:#fff}
.chart-head .pill{margin-left:auto}
.lgnd{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--fg-3)}
.lgnd span{display:inline-flex;align-items:center;gap:6px}
.lgnd i{width:9px;height:9px;border-radius:2px;display:inline-block}
.lgnd .c1{background:var(--v-500)}.lgnd .c2{background:var(--info)}.lgnd .c3{background:var(--ok)}.lgnd .c4{background:var(--warn)}

.bars{display:flex;align-items:flex-end;gap:10px;height:180px;padding:10px 0}
.bars .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.bars .bg{width:100%;display:flex;flex-direction:column-reverse;gap:2px;height:150px;align-items:center}
.bars .seg{width:70%;border-radius:3px;min-height:2px}
.bars .seg.a{background:var(--v-500)}
.bars .seg.b{background:var(--info)}
.bars .seg.c{background:var(--ok)}
.bars .label{font-size:10px;color:var(--fg-3);font-family:var(--font-mono)}

.donut{width:160px;height:160px;border-radius:50%;background:conic-gradient(var(--v-500) 0 62%,var(--info) 62% 82%,var(--ok) 82% 94%,var(--warn) 94% 100%);position:relative;flex-shrink:0}
.donut::after{content:'';position:absolute;inset:22%;background:var(--bg-2);border-radius:50%}
.donut-center{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.donut-center .v{font-family:var(--font-display);font-size:26px;font-weight:600;color:#fff}
.donut-center .l{font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em}

.line-chart{position:relative;height:180px;padding:10px 0}
.line-chart svg{width:100%;height:100%;overflow:visible}
.gridline{stroke:var(--line-1);stroke-width:1}

.bubble-cluster{position:relative;height:340px;background:radial-gradient(circle at 50% 50%,rgba(110,70,255,.08),transparent 70%);border-radius:12px;border:1px solid var(--line-1);overflow:hidden}
.bub{position:absolute;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:500;text-align:center;padding:8px;box-shadow:0 10px 30px rgba(0,0,0,.3);transition:transform .2s;cursor:pointer}
.bub:hover{transform:scale(1.05)}
.bub small{display:block;opacity:.7;font-size:9px;font-family:var(--font-mono)}

/* login variant B specific */
.login-centered{min-height:calc(100vh - 57px);background:var(--grad-hero);display:grid;place-items:center;padding:40px 20px;position:relative;overflow:hidden}
.login-centered::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 2px 2px,rgba(255,255,255,.04) 1px,transparent 0);background-size:24px 24px;pointer-events:none}
.login-card{width:min(420px,100%);background:var(--bg-1);border:1px solid var(--line-2);border-radius:20px;padding:36px;box-shadow:0 40px 100px rgba(0,0,0,.6),0 0 0 1px rgba(110,70,255,.1);position:relative;z-index:1}
.login-card::before{content:'';position:absolute;inset:-1px;border-radius:20px;background:linear-gradient(135deg,rgba(110,70,255,.5),transparent 40%,rgba(92,196,255,.3));z-index:-1;filter:blur(8px);opacity:.6}

/* Responsive */
@media (max-width:1100px){
  .app.three-col{grid-template-columns:72px 220px 1fr}
  .ctx{display:none}
  .chat-layout{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:860px){
  .app,.app.three-col{grid-template-columns:56px 1fr}
  .side{display:none}
  .kanban{grid-template-columns:1fr}
  .login-wrap{grid-template-columns:1fr}
  .login-vis{display:none}
  .settings-grid{grid-template-columns:1fr}
  .settings-nav{display:none}
}

/* tweaks panel */
.tweaks{position:fixed;right:16px;bottom:16px;z-index:100;background:var(--bg-2);border:1px solid var(--line-2);border-radius:14px;padding:12px;display:none;width:220px;box-shadow:var(--shadow-md)}
.tweaks.on{display:block}
.tweaks h6{margin:0 0 10px;font-size:11px;font-weight:600;color:var(--fg-3);letter-spacing:.08em;text-transform:uppercase}
.tweaks label{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:12px;color:var(--fg-1)}
</style>

// ============= ROUTER =============
const RENDERERS = {
  login: {a: loginA, b: loginB},
  chat: {a: chatA, b: chatB},
  tickets: {a: ticketsA, b: ticketsB},
  kb: {a: kbA, b: kbB},
  settings: {a: settingsA, b: settingsB},
  analytics: {a: analyticsA, b: analyticsB}
};

const state = {
  screen: localStorage.getItem('aria.screen') || 'chat',
  variant: localStorage.getItem('aria.variant') || 'a'
};

function renderTabs(){
  document.getElementById('screenTabs').innerHTML = SCREENS.map(s=>
    `<button class="screen-tab ${s.id===state.screen?'active':''}" data-screen="${s.id}">${s.label}</button>`
  ).join('');
  document.querySelectorAll('#variantPills .vpill').forEach(p=>{
    p.classList.toggle('active', p.dataset.v === state.variant);
  });
}
function renderStage(){
  const r = RENDERERS[state.screen]?.[state.variant];
  document.getElementById('stage').innerHTML = r ? `<section class="screen active" data-screen-label="${state.screen}-${state.variant}">${r()}</section>` : '<div style="padding:40px;color:#888">—</div>';
  // wire rail goto
  document.querySelectorAll('[data-goto]').forEach(b=>{
    b.addEventListener('click', ()=>{ state.screen = b.dataset.goto; persist(); renderTabs(); renderStage(); });
  });
}
function persist(){
  localStorage.setItem('aria.screen', state.screen);
  localStorage.setItem('aria.variant', state.variant);
}

document.addEventListener('click', e=>{
  const t = e.target.closest('.screen-tab'); if(t){ state.screen = t.dataset.screen; persist(); renderTabs(); renderStage(); return; }
  const v = e.target.closest('.vpill'); if(v){ state.variant = v.dataset.v; persist(); renderTabs(); renderStage(); return; }
  const tg = e.target.closest('.toggle[data-tweak]'); if(tg){ tg.classList.toggle('on'); applyTweaks(); return; }
});

function applyTweaks(){
  const cotOn = document.querySelector('.toggle[data-tweak="cot"]')?.classList.contains('on');
  const promoOn = document.querySelector('.toggle[data-tweak="promo"]')?.classList.contains('on');
  document.querySelectorAll('.cot').forEach(e=>e.style.display = cotOn?'':'none');
  document.querySelectorAll('.promo').forEach(e=>e.style.display = promoOn?'':'none');
}

// Tweaks edit mode bridge
window.addEventListener('message', e=>{
  if(!e.data) return;
  if(e.data.type==='__activate_edit_mode') document.getElementById('tweaks').classList.add('on');
  if(e.data.type==='__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('on');
});
window.parent?.postMessage({type:'__edit_mode_available'}, '*');

renderTabs();
renderStage();
</script>
